<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
        <title>Spirited Away Pomodoro</title>
    </head>
    <body>
        <video muted loop id="video-background">
            <source src="assets/background.mp4" type="video/mp4">
        </video>
        <div class="content">
            <img src="assets/logo.jpg" alt="Spirited Away Logo" id="logo" />
            <p id="description">
                <em>
                    Stay focused and Productive with our Spirited Away Themed Pomodoro Timer!
                </em>
            </p>
            <div class="timer">
                <h1>Timer</h1>
                <p id="countDown">25 : 00</p>
                <hr/>
                <div id="settings">
                    <label class="setting-label" for="workDuration">Work Duration (minutes): </label>
                    <input class="setting-input" type="number" id="workDuration" value="25" min="1" />
                </div>
            </div>
        </div>
    </body>
</html>
